<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCK 50 - 完全運ゲー(Beta)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); max-width: 420px; margin: auto; border: 1px solid #333; position: relative; overflow: hidden; }
        .test-badge { background: #ffd700; color: black; font-size: 0.7rem; font-weight: 900; padding: 5px 0; width: 150px; position: absolute; top: 15px; right: -40px; transform: rotate(45deg); text-transform: uppercase; letter-spacing: 1px; }
        .prize-pool { background: linear-gradient(145deg, #2c2c2c, #1a1a1a); padding: 20px; border-radius: 18px; border: 1px solid #ffd700; margin-bottom: 10px; }
        .prize-amount { font-size: 2.2rem; font-weight: bold; color: #fff; display: block; margin-top: 5px; text-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .info-bar { font-size: 0.8rem; color: #00ff88; margin-bottom: 15px; background: rgba(0,255,136,0.1); padding: 8px; border-radius: 8px; border: 1px solid rgba(0,255,136,0.2); }
        .score-display { font-size: 5rem; font-weight: 900; color: #00ff88; margin: 15px 0; text-shadow: 0 0 25px rgba(0,255,136,0.3); }
        button { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 14px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-challenge { background: linear-gradient(135deg, #ff0055, #ff4081); color: white; box-shadow: 0 5px 15px rgba(255,0,85,0.3); }
        .btn-challenge:active { transform: scale(0.98); }
        .btn-save { background: #2196f3; color: white; }
        .btn-ad { background: #6200ea; color: white; display: none; }
        .btn-admin-resurrect { background: #ff9800; color: black; display: none; }
        .ranking { margin-top: 30px; text-align: left; background: #252525; padding: 20px; border-radius: 16px; border: 1px solid #333; }
        .ranking h3 { margin-top: 0; font-size: 1rem; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .contact-area { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 0.85rem; }
        .contact-link { color: #2196f3; text-decoration: none; font-weight: bold; border-bottom: 1px solid #2196f3; }
        .btn-admin-auth { background: transparent; color: #333; font-size: 0.7rem; padding: 5px; width: auto; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="test-badge">Beta Test</div>
    
    <div class="prize-pool">
        <span style="color:#ffd700; font-size: 0.9rem; font-weight: bold;">💰 推定キャリーオーバー賞金</span>
        <span class="prize-amount" id="prize-text">¥0</span>
    </div>
    
    <div class="info-bar">🏆 毎週日曜24時締切 / 上位3名に特典！</div>
    
    <div id="status-msg" style="height:24px; font-weight:bold; color:#888;">TAP TO START</div>
    <div class="score-display" id="score-text">0</div>

    <button class="btn-challenge" id="challenge-btn">挑戦する (50%)</button>
    <button class="btn-save" id="save-btn" style="display:none;">保存して終了</button>
    <button class="btn-ad" id="ad-btn">広告で復活 (残り3回)</button>
    <button class="btn-admin-resurrect" id="admin-res-btn">管理者パワーで復活</button>

    <div class="ranking">
        <h3>📊 世界ランキング (Top 10)</h3>
        <div id="ranking-list">読み込み中...</div>
    </div>

    <div class="contact-area">
        📩 ご要望・当選確認は<br>
        <a href="https://x.com/_LUCK_50" target="_blank" class="contact-link">公式X（@_LUCK_50）まで</a>
    </div>

    <button class="btn-admin-auth" id="admin-auth-btn">管理者用</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // 最新のFirebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDMwuHeWjTy8mh3kYP8yz9_YoF9IFi9e7I",
        authDomain: "kuck1-12bc6.firebaseapp.com",
        projectId: "kuck1-12bc6",
        storageBucket: "kuck1-12bc6.firebasestorage.app",
        messagingSenderId: "888812967555",
        appId: "1:888812967555:web:7e54f508a6bf5ed931adb6",
        measurementId: "G-Q7876FZ3QP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentScore = 0;
    let isGameOver = false;
    let adCount = 3;
    let isAdmin = false;
    let statsLoaded = false;

    // --- Firebase リアルタイムデータ取得 ---
    onSnapshot(doc(db, "config", "stats"), (d) => {
        if(d.exists()) {
            const watchedCount = Number(d.data().total_ads_watched) || 0;
            const amount = Math.floor(watchedCount * 5 * 0.6);
            document.getElementById('prize-text').innerText = `¥${amount.toLocaleString()}`;
            statsLoaded = true;
        }
    }, (err) => { statsLoaded = true; });

    onSnapshot(query(collection(db, "rankings"), orderBy("score", "desc"), limit(10)), (s) => {
        const l = document.getElementById('ranking-list');
        l.innerHTML = "";
        s.forEach(d => {
            l.innerHTML += `<div class="ranking-item"><span>${d.data().name}</span><span>${d.data().score} 連勝</span></div>`;
        });
    });

    // --- ゲームロジック ---
    document.getElementById('challenge-btn').onclick = () => {
        if (Math.random() < 0.5) {
            currentScore++;
            document.getElementById('status-msg').innerText = "SUCCESS!";
            document.getElementById('status-msg').style.color = "#00ff88";
        } else {
            isGameOver = true;
            document.getElementById('status-msg').innerText = "FAILED...";
            document.getElementById('status-msg').style.color = "#ff0055";
        }
        updateUI();
    };

    document.getElementById('save-btn').onclick = async () => {
        const n = prompt("名前を入力してください", "名無しさん");
        if (!n) return;
        await addDoc(collection(db, "rankings"), { 
            name: n + (isAdmin ? " (Admin)" : ""), 
            score: currentScore, 
            timestamp: serverTimestamp() 
        });
        currentScore = 0;
        isGameOver = false;
        updateUI();
        alert("ランキングに保存しました！");
    };

    document.getElementById('ad-btn').onclick = async () => {
        if (!statsLoaded) return;
        if (adCount <= 0 && !isAdmin) { alert("回数制限です"); return; }
        try {
            await updateDoc(doc(db, "config", "stats"), { total_ads_watched: increment(1) });
            if (!isAdmin) adCount--;
            isGameOver = false;
            document.getElementById('status-msg').innerText = "RESURRECTED!";
            updateUI();
        } catch (e) { alert("通信エラー"); }
    };

    // --- 管理者機能 ---
    document.getElementById('admin-res-btn').onclick = () => { isGameOver = false; updateUI(); };
    document.getElementById('admin-auth-btn').onclick = () => {
        if(prompt("パスワード入力") === "1234") { 
            isAdmin = true; 
            alert("管理者モード有効"); 
            updateUI(); 
        }
    };

    function updateUI() {
        document.getElementById('score-text').innerText = currentScore;
        document.getElementById('challenge-btn').style.display = isGameOver ? 'none' : 'block';
        document.getElementById('save-btn').style.display = (!isGameOver && currentScore > 0) ? 'block' : 'none';
        document.getElementById('ad-btn').style.display = isGameOver ? 'block' : 'none';
        document.getElementById('admin-res-btn').style.display = (isGameOver && isAdmin) ? 'block' : 'none';
        document.getElementById('ad-btn').innerText = isAdmin ? "管理者復活" : `広告で復活 (残り${adCount}回)`;
    }
</script>
</body>
</html>
